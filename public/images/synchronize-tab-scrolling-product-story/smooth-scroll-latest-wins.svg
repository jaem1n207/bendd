<svg width="1344" height="768" viewBox="0 0 1344 768" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1344" height="768" rx="32" fill="#F7F8FA"/>
  <rect x="72" y="72" width="1200" height="624" rx="28" fill="white" stroke="#D9DEE8" stroke-width="2"/>
  <text x="112" y="132" fill="#111827" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="34" font-weight="700">부드러운 스크롤은 동기화 스크롤까지 느리게 만들 수 있어요</text>
  <text x="112" y="172" fill="#6B7280" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="20">페이지 CSS와 빠른 scroll event가 겹치면 수신 탭은 지나간 위치를 뒤늦게 따라갈 수 있어요.</text>

  <rect x="112" y="238" width="536" height="360" rx="24" fill="#F9FAFB" stroke="#D1D5DB"/>
  <text x="144" y="286" fill="#111827" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="24" font-weight="700">Before</text>
  <text x="144" y="318" fill="#6B7280" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="18">모든 scroll:sync를 순서대로 적용</text>
  <g font-family="Inter, sans-serif">
    <rect x="152" y="366" width="116" height="50" rx="14" fill="white" stroke="#D1D5DB"/>
    <text x="178" y="397" fill="#111827" font-size="17" font-weight="700">sync 1</text>
    <path d="M284 391H344" stroke="#9CA3AF" stroke-width="3" stroke-linecap="round"/>
    <path d="M332 377L346 391L332 405" stroke="#9CA3AF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="360" y="366" width="116" height="50" rx="14" fill="white" stroke="#D1D5DB"/>
    <text x="386" y="397" fill="#111827" font-size="17" font-weight="700">sync 2</text>
    <path d="M492 391H552" stroke="#9CA3AF" stroke-width="3" stroke-linecap="round"/>
    <path d="M540 377L554 391L540 405" stroke="#9CA3AF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="152" y="452" width="416" height="66" rx="18" fill="#FEE2E2" stroke="#F87171"/>
    <text x="178" y="492" fill="#991B1B" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="18" font-weight="700">smooth scrolling이 지나간 위치를 애니메이션으로 따라감</text>
  </g>

  <rect x="696" y="238" width="536" height="360" rx="24" fill="#F9FAFB" stroke="#D1D5DB"/>
  <text x="728" y="286" fill="#111827" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="24" font-weight="700">After</text>
  <text x="728" y="318" fill="#6B7280" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="18">다음 frame에서 최신 위치 하나만 적용</text>
  <g font-family="Inter, Apple SD Gothic Neo, sans-serif">
    <rect x="736" y="366" width="122" height="50" rx="14" fill="white" stroke="#D1D5DB"/>
    <text x="760" y="397" fill="#6B7280" font-size="17">sync 1</text>
    <rect x="878" y="366" width="122" height="50" rx="14" fill="white" stroke="#D1D5DB"/>
    <text x="902" y="397" fill="#6B7280" font-size="17">sync 2</text>
    <rect x="1020" y="366" width="122" height="50" rx="14" fill="#DBEAFE" stroke="#3B82F6"/>
    <text x="1044" y="397" fill="#1E40AF" font-size="17" font-weight="700">latest</text>
    <path d="M1081 430V462" stroke="#9CA3AF" stroke-width="3" stroke-linecap="round"/>
    <path d="M1067 450L1081 464L1095 450" stroke="#9CA3AF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="796" y="478" width="346" height="58" rx="18" fill="#DCFCE7" stroke="#22C55E"/>
    <text x="824" y="514" fill="#166534" font-size="18" font-weight="700">scrollBehavior를 잠시 auto로 바꾸고 최신 위치만 적용</text>
  </g>

  <rect x="400" y="638" width="544" height="44" rx="22" fill="#111827"/>
  <text x="442" y="667" fill="white" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="18" font-weight="700">메시지를 더 보내는 대신, 적용 범위와 타이밍을 좁혔어요</text>
</svg>
