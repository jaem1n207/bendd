    <text x="748" y="516" fill="#1D4ED8" font-size="17" font-weight="700">결과: 수신 탭이 오래된 위치를 뒤늦게 따라가지 않음</text>
  </g>

  <rect x="290" y="632" width="764" height="58" rx="22" fill="white" stroke="#D8DEE8"/>
  <text x="326" y="667" fill="#334155" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="18" font-weight="700">아래 GIF에서는 smooth-scroll이 적용된 페이지에서 문제를 재현한 모습을 볼 수 있어요.</text>
