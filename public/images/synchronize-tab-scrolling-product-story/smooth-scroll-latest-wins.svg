    <path d="M416 408L428 420L416 432" stroke="#CBD5E1" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="446" y="392" width="80" height="56" rx="16" fill="#F8FAFC" stroke="#CBD5E1"/>
    <text x="469" y="426" fill="#334155" font-size="17" font-weight="700">920</text>
    <text x="108" y="516" fill="#B91C1C" font-size="17" font-weight="700">결과: 스크롤이 밀리고 버벅이는 것처럼 보임</text>

    <rect x="712" y="158" width="560" height="430" rx="28" fill="white" stroke="#D8DEE8"/>
    <rect x="748" y="196" width="182" height="36" rx="18" fill="#DBEAFE"/>
    <text x="776" y="220" fill="#1D4ED8" font-size="16" font-weight="700">개선 방식</text>
    <text x="748" y="278" fill="#111827" font-size="22" font-weight="700">requestAnimationFrame마다 최신 위치만 적용</text>
    <text x="748" y="314" fill="#64748B" font-size="16">한 프레임 안에 여러 위치가 들어와도</text>
    <text x="748" y="340" fill="#64748B" font-size="16">마지막 위치 하나만 남겨 수신 탭을 최신 상태로 맞춰요.</text>

    <rect x="762" y="392" width="80" height="56" rx="16" fill="#F8FAFC" stroke="#CBD5E1"/>
    <text x="785" y="426" fill="#94A3B8" font-size="17" font-weight="700">120</text>
