<svg width="1344" height="768" viewBox="0 0 1344 768" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1344" height="768" rx="32" fill="#F8FAFC"/>
  <text x="72" y="70" fill="#111827" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="34" font-weight="700">부드러운 스크롤은 동기화 지연처럼 보일 수 있어요</text>
  <text x="72" y="102" fill="#64748B" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="18">수신 탭에서 모든 메시지를 순서대로 재생하면 이미 지나간 위치를 뒤늦게 따라가게 돼요.</text>

  <g font-family="Inter, Apple SD Gothic Neo, sans-serif">
    <rect x="72" y="158" width="560" height="430" rx="28" fill="white" stroke="#D8DEE8"/>
    <rect x="108" y="196" width="182" height="36" rx="18" fill="#FEE2E2"/>
    <text x="136" y="220" fill="#B91C1C" font-size="16" font-weight="700">기존 방식</text>
    <text x="108" y="278" fill="#111827" font-size="22" font-weight="700">들어온 위치를 모두 적용</text>
    <text x="108" y="314" fill="#64748B" font-size="16">smooth scroll이 각 위치를 애니메이션화하면서</text>
    <text x="108" y="340" fill="#64748B" font-size="16">수신 탭은 오래된 위치를 순서대로 따라가요.</text>

    <rect x="122" y="392" width="80" height="56" rx="16" fill="#F8FAFC" stroke="#CBD5E1"/>
