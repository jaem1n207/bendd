<svg width="1344" height="768" viewBox="0 0 1344 768" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="softShadow" x="0" y="0" width="1344" height="768" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <style>
      .text { font-family: Inter, Apple SD Gothic Neo, sans-serif; }
      .title { fill: #111827; font-size: 34px; font-weight: 800; }
      .subtitle { fill: #64748B; font-size: 18px; font-weight: 600; }
      .card-title { fill: #111827; font-size: 23px; font-weight: 800; }
      .label { fill: #111827; font-size: 18px; font-weight: 800; }
      .body { fill: #64748B; font-size: 16px; font-weight: 600; }
      .small { font-size: 14px; font-weight: 700; }
    </style>
  </defs>

  <rect width="1344" height="768" rx="32" fill="#F8FAFC"/>
  <text class="text title" x="72" y="72">작은 상태 점은 신뢰를 유지하는 신호예요</text>
  <text class="text subtitle" x="72" y="108">사용자가 돌아왔을 때 조용히 실패하지 않도록, 상태와 복구 흐름을 작게 보여줘요.</text>

  <g class="text" filter="url(#softShadow)">
    <rect x="72" y="168" width="356" height="466" rx="30" fill="white" stroke="#D8DEE8"/>
    <text class="card-title" x="112" y="226">실제 오버레이 버튼</text>

    <circle cx="250" cy="356" r="48" fill="#333333"/>
    <circle cx="250" cy="356" r="48" stroke="#111827" stroke-opacity="0.28" stroke-width="3"/>
    <path d="M228 339H272" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <path d="M228 356H272" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <path d="M228 373H272" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <circle cx="292" cy="392" r="17" fill="#3B82F6" stroke="#111827" stroke-width="4"/>

    <text x="112" y="508" fill="#334155" font-size="18" font-weight="800">상태는 버튼의 작은 점으로 표시해요</text>
    <text class="body" x="112" y="544">색상 점만 봐도 연결 상태와</text>
    <text class="body" x="112" y="570">확인 필요 여부를 빠르게 알 수 있어요.</text>
  </g>

  <g class="text">
    <rect x="480" y="168" width="792" height="260" rx="30" fill="white" stroke="#D8DEE8"/>
    <text class="card-title" x="528" y="226">색상이 말하는 상태</text>

    <circle cx="556" cy="286" r="15" fill="#3B82F6" stroke="#111827" stroke-width="4"/>
    <text class="label" x="594" y="292">파란색</text>
    <text class="body" x="700" y="292">연결이 살아 있고 URL Sync도 켜져 있어요.</text>

    <circle cx="556" cy="346" r="15" fill="#9CA3AF" stroke="#111827" stroke-width="4"/>
    <text class="label" x="594" y="352">회색</text>
    <text class="body" x="700" y="352">연결은 괜찮지만 URL Sync는 꺼져 있어요.</text>

    <circle cx="556" cy="406" r="15" fill="#F59E0B" stroke="#111827" stroke-width="4"/>
    <text class="label" x="594" y="412">주황색 깜박임</text>
    <text class="body" x="742" y="412">연결 확인이나 재연결이 필요한 상태예요.</text>
  </g>

  <g class="text">
    <rect x="480" y="464" width="792" height="206" rx="30" fill="white" stroke="#D8DEE8"/>
    <text class="card-title" x="528" y="522">오래 쉬던 탭으로 돌아왔을 때의 복구 흐름</text>

    <rect x="528" y="562" width="118" height="62" rx="18" fill="#F8FAFC" stroke="#CBD5E1"/>
    <text x="564" y="588" fill="#111827" font-size="17" font-weight="800">탭 복귀</text>
    <text x="554" y="612" fill="#64748B" font-size="14" font-weight="700">visible 상태</text>

    <path d="M666 593H714" stroke="#CBD5E1" stroke-width="4" stroke-linecap="round"/>
    <path d="M704 579L718 593L704 607" stroke="#CBD5E1" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="736" y="562" width="118" height="62" rx="18" fill="#EFF6FF" stroke="#93C5FD"/>
    <text x="775" y="588" fill="#1E3A8A" font-size="17" font-weight="800">ping</text>
    <text x="764" y="612" fill="#1D4ED8" font-size="14" font-weight="700">연결 확인</text>

    <path d="M874 593H922" stroke="#CBD5E1" stroke-width="4" stroke-linecap="round"/>
    <path d="M912 579L926 593L912 607" stroke="#CBD5E1" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="944" y="562" width="144" height="62" rx="18" fill="#FEF3C7" stroke="#F59E0B"/>
    <text x="986" y="588" fill="#92400E" font-size="17" font-weight="800">재연결</text>
    <text x="966" y="612" fill="#B45309" font-size="14" font-weight="700">500ms · 1s · 2s</text>

    <path d="M1108 593H1156" stroke="#CBD5E1" stroke-width="4" stroke-linecap="round"/>
    <path d="M1146 579L1160 593L1146 607" stroke="#CBD5E1" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="1176" y="562" width="62" height="62" rx="18" fill="#F1F5F9" stroke="#CBD5E1"/>
    <text x="1190" y="588" fill="#111827" font-size="15" font-weight="800">재주입</text>
    <text x="1192" y="612" fill="#64748B" font-size="13" font-weight="700">실패 시</text>
  </g>
</svg>
