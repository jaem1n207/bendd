<svg width="1344" height="768" viewBox="0 0 1344 768" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="softShadow" x="0" y="0" width="1344" height="768" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1344" height="768" rx="32" fill="#F8FAFC"/>
  <text x="72" y="70" fill="#111827" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="34" font-weight="700">작은 상태 점은 신뢰를 유지하는 신호예요</text>
  <text x="72" y="102" fill="#64748B" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="18">사용자가 돌아왔을 때 조용히 실패하지 않도록, 상태와 복구 흐름을 작게 보여줘요.</text>

  <g filter="url(#softShadow)">
    <rect x="72" y="154" width="378" height="472" rx="28" fill="white" stroke="#D8DEE8"/>
    <text x="112" y="214" fill="#111827" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="24" font-weight="700">실제 오버레이 버튼</text>
    <image href="data:image/png;base64," x="188" y="256" width="114" height="138"/>
    <text x="112" y="446" fill="#334155" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="18" font-weight="700">상태는 버튼의 작은 점으로 표시해요</text>
    <text x="112" y="480" fill="#64748B" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="16">사용자는 색상 점만 보고도 연결이 살아 있는지, 확인이 필요한지 빠르게 알아차릴 수 있어요.</text>
  </g>

  <g font-family="Inter, Apple SD Gothic Neo, sans-serif">
    <rect x="496" y="154" width="776" height="216" rx="28" fill="white" stroke="#D8DEE8"/>
    <text x="536" y="210" fill="#111827" font-size="24" font-weight="700">색상이 말하는 상태</text>

    <circle cx="560" cy="268" r="14" fill="#3B82F6" stroke="#111827" stroke-width="3"/>
    <text x="590" y="274" fill="#111827" font-size="18" font-weight="700">파란색</text>
    <text x="666" y="274" fill="#64748B" font-size="17">연결이 살아 있고 URL Sync도 켜져 있어요.</text>

    <circle cx="560" cy="316" r="14" fill="#9CA3AF" stroke="#111827" stroke-width="3"/>
    <text x="590" y="322" fill="#111827" font-size="18" font-weight="700">회색</text>
    <text x="666" y="322" fill="#64748B" font-size="17">연결은 괜찮지만 URL Sync는 꺼져 있어요.</text>

    <circle cx="560" cy="364" r="14" fill="#F59E0B" stroke="#111827" stroke-width="3"/>
    <text x="590" y="370" fill="#111827" font-size="18" font-weight="700">주황색 깜박임</text>
    <text x="722" y="370" fill="#64748B" font-size="17">연결 확인이나 재연결이 필요한 상태예요.</text>
  </g>

  <g font-family="Inter, Apple SD Gothic Neo, sans-serif">
    <rect x="496" y="408" width="776" height="218" rx="28" fill="white" stroke="#D8DEE8"/>
    <text x="536" y="464" fill="#111827" font-size="24" font-weight="700">오래 쉬던 탭으로 돌아왔을 때의 복구 흐름</text>

    <rect x="536" y="506" width="118" height="62" rx="18" fill="#F8FAFC" stroke="#CBD5E1"/>
    <text x="572" y="532" fill="#111827" font-size="17" font-weight="700">탭 복귀</text>
    <text x="562" y="556" fill="#64748B" font-size="14">visible 상태</text>

    <path d="M672 537H720" stroke="#CBD5E1" stroke-width="3" stroke-linecap="round"/>
    <path d="M710 524L724 537L710 550" stroke="#CBD5E1" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="740" y="506" width="118" height="62" rx="18" fill="#EFF6FF" stroke="#93C5FD"/>
    <text x="778" y="532" fill="#1E3A8A" font-size="17" font-weight="700">ping</text>
    <text x="768" y="556" fill="#1D4ED8" font-size="14">연결 확인</text>

    <path d="M876 537H924" stroke="#CBD5E1" stroke-width="3" stroke-linecap="round"/>
    <path d="M914 524L928 537L914 550" stroke="#CBD5E1" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="944" y="506" width="144" height="62" rx="18" fill="#FEF3C7" stroke="#F59E0B"/>
    <text x="986" y="532" fill="#92400E" font-size="17" font-weight="700">재연결</text>
    <text x="966" y="556" fill="#B45309" font-size="14">500ms · 1s · 2s</text>

    <path d="M1106 537H1154" stroke="#CBD5E1" stroke-width="3" stroke-linecap="round"/>
    <path d="M1144 524L1158 537L1144 550" stroke="#CBD5E1" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="1174" y="506" width="58" height="62" rx="18" fill="#F1F5F9" stroke="#CBD5E1"/>
    <text x="1188" y="532" fill="#111827" font-size="15" font-weight="700">재주입</text>
    <text x="1191" y="556" fill="#64748B" font-size="13">실패 시</text>
  </g>
</svg>
