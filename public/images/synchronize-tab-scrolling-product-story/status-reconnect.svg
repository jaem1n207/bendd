<svg width="1344" height="768" viewBox="0 0 1344 768" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1344" height="768" rx="32" fill="#F8FAFC"/>
  <rect x="72" y="72" width="1200" height="624" rx="28" fill="white" stroke="#D8DEE8" stroke-width="2"/>
  <text x="112" y="132" fill="#111827" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="34" font-weight="700">작은 색상 점은 기능 설명보다 신뢰 신호에 가까워요</text>
  <text x="112" y="172" fill="#6B7280" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="20">사용자가 돌아왔을 때 동기화가 조용히 실패하지 않도록 상태와 복구 흐름을 함께 보여줘요.</text>

  <rect x="112" y="232" width="326" height="322" rx="22" fill="#F9FAFB" stroke="#E5E7EB"/>
  <text x="144" y="280" fill="#111827" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="24" font-weight="700">상태 점</text>
  <circle cx="164" cy="340" r="14" fill="#3B82F6"/>
  <text x="194" y="347" fill="#111827" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="20" font-weight="700">연결됨</text>
  <text x="194" y="374" fill="#6B7280" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="17">URL Sync도 켜져 있음</text>
  <circle cx="164" cy="430" r="14" fill="#9CA3AF"/>
  <text x="194" y="437" fill="#111827" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="20" font-weight="700">대기</text>
  <text x="194" y="464" fill="#6B7280" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="17">연결은 살아 있지만 URL Sync 꺼짐</text>
  <circle cx="164" cy="520" r="14" fill="#F59E0B"/>
  <text x="194" y="527" fill="#111827" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="20" font-weight="700">확인 필요</text>
  <text x="194" y="554" fill="#6B7280" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="17">재연결 또는 상태 확인 중</text>

  <rect x="500" y="232" width="706" height="322" rx="22" fill="#F9FAFB" stroke="#E5E7EB"/>
  <text x="532" y="280" fill="#111827" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="24" font-weight="700">복구 흐름</text>
  <g font-family="Inter, Apple SD Gothic Neo, sans-serif">
    <rect x="538" y="328" width="142" height="74" rx="18" fill="white" stroke="#D1D5DB"/>
    <text x="570" y="360" fill="#111827" font-size="18" font-weight="700">탭 복귀</text>
    <text x="558" y="386" fill="#6B7280" font-size="15">오래 쉬던 탭</text>
    <path d="M696 365H746" stroke="#9CA3AF" stroke-width="3" stroke-linecap="round"/>
    <path d="M734 350L749 365L734 380" stroke="#9CA3AF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="764" y="328" width="142" height="74" rx="18" fill="white" stroke="#D1D5DB"/>
    <text x="806" y="360" fill="#111827" font-size="18" font-weight="700">ping</text>
    <text x="786" y="386" fill="#6B7280" font-size="15">연결 확인</text>
    <path d="M922 365H972" stroke="#9CA3AF" stroke-width="3" stroke-linecap="round"/>
    <path d="M960 350L975 365L960 380" stroke="#9CA3AF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="990" y="328" width="172" height="74" rx="18" fill="white" stroke="#D1D5DB"/>
    <text x="1028" y="360" fill="#111827" font-size="18" font-weight="700">재연결 시도</text>
    <text x="1018" y="386" fill="#6B7280" font-size="15">500ms → 1000ms → 2000ms</text>
    <path d="M1076 414V450" stroke="#9CA3AF" stroke-width="3" stroke-linecap="round"/>
    <path d="M1062 438L1076 452L1090 438" stroke="#9CA3AF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="990" y="466" width="172" height="58" rx="18" fill="#FEF3C7" stroke="#F59E0B"/>
    <text x="1020" y="501" fill="#92400E" font-size="18" font-weight="700">실패 시 재주입</text>
    <rect x="538" y="466" width="346" height="58" rx="18" fill="#DBEAFE" stroke="#3B82F6"/>
    <text x="562" y="501" fill="#1E40AF" font-size="18" font-weight="700">사용자가 원인을 추측하지 않아도 되게 하기</text>
  </g>
  <text x="112" y="628" fill="#374151" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="20">상태 피드백은 문제가 생긴 뒤 설명하는 장치가 아니라, 기대가 깨지는 순간을 줄이는 장치예요.</text>
</svg>
