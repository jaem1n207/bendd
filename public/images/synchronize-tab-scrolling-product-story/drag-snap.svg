    <text x="132" y="552" fill="#64748B" font-size="16">픽셀 단위로 정확히 맞출 필요는 없어요.</text>

    <path d="M640 378H704" stroke="#CBD5E1" stroke-width="4" stroke-linecap="round"/>
    <path d="M692 360L710 378L692 396" stroke="#CBD5E1" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="748" y="168" width="500" height="420" rx="28" fill="white" stroke="#D8DEE8"/>
    <text x="784" y="222" fill="#111827" font-size="24" font-weight="700">2. 가까운 테두리에 스냅</text>
    <rect x="784" y="262" width="428" height="250" rx="22" fill="#F8FAFC" stroke="#E5E7EB"/>
    <rect x="806" y="284" width="384" height="206" rx="18" fill="none" stroke="#93C5FD" stroke-width="3" stroke-dasharray="12 10"/>
