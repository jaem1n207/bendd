  <text x="72" y="102" fill="#64748B" font-family="Inter, Apple SD Gothic Neo, sans-serif" font-size="18">사용자는 방향만 결정하고, 제품이 마지막 정렬을 맡아 조작 부담을 줄여요.</text>

  <g font-family="Inter, Apple SD Gothic Neo, sans-serif">
    <rect x="96" y="168" width="500" height="420" rx="28" fill="white" stroke="#D8DEE8"/>
